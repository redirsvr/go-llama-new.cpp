# Пути относительно корня модуля (без переменных окружения)
LLAMA_CPP_PATH=llama.cpp

# Режим сборки: cpu | cuda | rocm
# cpu  — только CPU (ggml-cpu)
# cuda — NVIDIA GPU + CUDA + CPU offloading (ggml-cuda + ggml-cpu)
# rocm — AMD GPU + ROCm/HIP + CPU offloading (ggml-hip + ggml-cpu)
BUILD_BACKEND=cpu

# Каталог CMake-сборки (для каждого BACKEND лучше отдельный каталог)
LLAMA_BUILD_PATH=llama.cpp/build

# --- CUDA (make cuda; пути ниже) ---
# CUDA_PATH=/usr/local/cuda
# CMAKE_CUDA_ARCHITECTURES=86

# --- ROCm (make rocm; пути ниже) ---
# ROCM_PATH=/opt/rocm
# ROCM_GPU_TARGETS=gfx1030
